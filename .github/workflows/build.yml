name: Build Packages

on:
  workflow_dispatch:
  push:
    branches: ["main", "master", "staging"]
  pull_request:
    branches: ["main", "master", "staging"]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Build Tooling
        shell: pwsh
        run: |
          choco install upx -y
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          scoop bucket add extras
          scoop install nsis
          "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows Installer Bundle
        shell: pwsh
        run: ./scripts/release/build-windows.ps1

      - name: Verify Windows Artifacts
        shell: pwsh
        run: ./scripts/release/verify-windows-artifacts.ps1

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            build/bin/*-installer.exe
            build/ADBKit-windows-standalone.zip

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            upx wget rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Build Tooling
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux Package Bundle
        run: bash ./scripts/release/build-linux.sh

      - name: Verify Linux Artifacts
        run: bash ./scripts/release/verify-artifacts.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/bin/*.deb
            build/bin/*.rpm
            build/bin/*.pkg.tar.zst
            build/bin/*.AppImage
